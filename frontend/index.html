<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Store | Marketplace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/ecommerce/index.css">
</head>
<body>
    <header class="main-header">
        <div class="container header-container">
            <div class="logo"><a href="index.html"><h1>Mega Store</h1></a></div>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="O que você está buscando?">
                <button id="btn-search"><i class="fas fa-search"></i></button>
            </div>

            <div class="header-actions" id="auth-section">
                <a href="#" class="icon-link"><i class="fas fa-store"></i><span>Vender</span></a>
                <a href="login.html" class="icon-link"><i class="fas fa-user"></i><span>Login</span></a>
                <a href="carrinho.html" class="icon-link cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count">0</span>
                </a>
            </div>
        </div>
    </header>

    <template id="user-logged-template">
        <div class="user-menu-wrapper">
            <a href="./html/home.html" id="seller-panel-link" class="icon-link" style="display: none;">
                <i class="fas fa-chart-line"></i><span>Painel</span>
            </a>
            
            <div class="user-dropdown-container">
                <div class="user-profile-trigger" id="user-trigger">
                    <img id="user-avatar" src="" alt="Avatar" class="header-avatar">
                    <span id="user-name">Usuário</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
                
                <div class="user-dropdown-menu" id="user-dropdown">
                    <a href="perfil.html"><i class="fas fa-user-circle"></i> Meu Perfil</a>
                    <a href="pedidos.html"><i class="fas fa-box"></i> Meus Pedidos</a>
                    <hr>
                    <button id="btn-logout" class="logout-btn">
                        <i class="fas fa-sign-out-alt"></i> Sair
                    </button>
                </div>
            </div>

            <a href="carrinho.html" class="icon-link cart-icon">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count-logged">0</span>
            </a>
        </div>
    </template>

    <main class="container">
        <section class="categories-section">
            <h2 class="section-title">Categorias</h2>
            <div class="categories-container">
                <button id="prev-cat" class="btn-nav prev"><i class="fas fa-chevron-left"></i></button>
                <button id="next-cat" class="btn-nav next"><i class="fas fa-chevron-right"></i></button>
                <div class="categories-wrapper" id="categories-wrapper">
                    <div id="categories-cards-grid" class="categories-grid"></div>
                </div>
            </div>
        </section>

        <div class="section-divider"></div>

        <section class="products-section">
            <h2 class="section-title">Recomendados para Você</h2>
            <div id="ecommerce-products-grid" class="products-grid"></div>
        </section>
    </main>

    <script src="js/common/auth.js"></script>
    <script src="js/ecommerce/index.js"></script> 
</body>
</html>
